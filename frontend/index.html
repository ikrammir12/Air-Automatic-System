<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirBook — Airline Booking</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- ════════════════════════════════════════
     AUTH SCREEN
════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">✈️</span>
      <h1>AirBook</h1>
      <p>Pakistan's Smart Airline Booking</p>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" id="tab-login">Sign In</button>
      <button class="tab-btn" id="tab-register">Register</button>
    </div>

    <!-- Login Form -->
    <form id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" value="user1@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password" value="password123" required>
      </div>
      <button type="submit" class="btn-primary" id="btn-login">Sign In</button>
    </form>

    <!-- Register Form -->
    <form id="register-form" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Ahmed Khan" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Phone (optional)</label>
        <input type="text" id="reg-phone" placeholder="03001234567">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" required>
      </div>
      <button type="submit" class="btn-primary" id="btn-register">Create Account</button>
    </form>

    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ════════════════════════════════════════
     MAIN APP
════════════════════════════════════════ -->
<div id="app-screen">

  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-logo">
      ✈️ <span>AirBook</span>
    </div>
    <div class="topbar-user">
      <div class="user-info">
        <div class="user-name" id="topbar-name"></div>
        <div class="user-email" id="topbar-email"></div>
      </div>
      <button class="btn-logout" id="btn-logout">Sign Out</button>
    </div>
  </header>

  <!-- Split Layout -->
  <div class="main-layout">

    <!-- LEFT: AI Chat -->
    <div class="chat-panel">
      <div class="panel-header">
        <div class="panel-title">
          <div class="status-dot"></div>
          SkyBot AI Assistant
        </div>
        <div class="panel-subtitle">Ask me to find or book flights</div>
      </div>

      <div class="chat-messages" id="chat-messages"></div>

      <div class="chat-input-area">
        <div class="quick-prompts">
          <button class="quick-btn" data-msg="Show flights from Lahore to Karachi">LHE → KHI</button>
          <button class="quick-btn" data-msg="Show flights from Lahore to Islamabad">LHE → ISB</button>
          <button class="quick-btn" data-msg="Show flights from Karachi to Islamabad">KHI → ISB</button>
          <button class="quick-btn" data-msg="Show all available flights">All Flights</button>
        </div>
        <div class="input-row">
          <textarea
            id="chat-input"
            rows="1"
            placeholder="Ask SkyBot... e.g. 'Show flights from Lahore to Karachi'"
          ></textarea>
          <button class="btn-send" id="btn-send">➤</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: Bookings Dashboard -->
    <div class="dashboard-panel">
      <div class="panel-header">
        <div class="panel-title">
          🎫 My Bookings
          <span id="booking-count" style="font-size:12px; color:var(--muted); font-weight:400; margin-left:6px"></span>
        </div>
        <div class="panel-subtitle">Manage your flight reservations</div>
      </div>

      <div class="bookings-list" id="bookings-container">
        <div class="empty-state">
          <span class="empty-icon">🎫</span>
          <p>No active bookings yet.<br>Ask SkyBot to book a flight!</p>
        </div>
      </div>

      <div class="dashboard-actions">
        <button class="btn-refresh" id="btn-refresh">↻ Refresh Bookings</button>
      </div>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/ai-assistant.js"></script>
<script src="js/main.js"></script>
</body>
</html>
